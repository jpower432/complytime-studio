# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
    {{- include "core.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "core.selectorLabels" (dict "component" "gateway" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "core.labels" . | nindent 8 }}
        {{- include "core.selectorLabels" (dict "component" "gateway" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          env:
            - name: PORT
              value: "8080"
            - name: POSTGRES_URL
              value: "postgres://{{ .Values.postgres.auth.user }}:{{ .Values.postgres.auth.password }}@core-postgres:5432/{{ .Values.postgres.auth.database }}?sslmode=disable"
            - name: NATS_URL
              value: "nats://core-nats:4222"
            - name: OAUTH2_PROXY_ENABLED
              value: "false"
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: core-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core.labels" . | nindent 4 }}
    {{- include "core.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "core.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
