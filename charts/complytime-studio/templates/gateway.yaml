# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "studio.labels" . | nindent 8 }}
        {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: internal
              containerPort: 8081
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          env:
            - name: PORT
              value: "8080"
            - name: INTERNAL_PORT
              value: "8081"
            - name: GITHUB_ORG
              value: {{ .Values.github.org | quote }}
            - name: GITHUB_REPO
              value: {{ .Values.github.repo | quote }}
            - name: AGENT_DIRECTORY
              value: >-
                {{- $enriched := list -}}
                {{- range .Values.agentDirectory -}}
                {{- $shortName := trimPrefix "studio-" .name -}}
                {{- $agentOverride := dict -}}
                {{- if hasKey $.Values.agents $shortName -}}
                {{- $agentOverride = index $.Values.agents $shortName -}}
                {{- end -}}
                {{- $agentModel := dict -}}
                {{- if hasKey $agentOverride "model" -}}
                {{- $agentModel = $agentOverride.model -}}
                {{- end -}}
                {{- $provider := default $.Values.model.provider (index $agentModel "provider" | default "") -}}
                {{- $modelName := default $.Values.model.name (index $agentModel "name" | default "") -}}
                {{- $entry := merge (dict "model" (dict "provider" $provider "name" $modelName)) (deepCopy .) -}}
                {{- $enriched = append $enriched $entry -}}
                {{- end }}
                {{ $enriched | toJson }}
            - name: KAGENT_A2A_URL
              value: {{ .Values.kagent.a2aURL | quote }}
            - name: KAGENT_AGENT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- if .Values.mcpServers.gemara.enabled }}
            - name: GEMARA_MCP_URL
              value: "http://studio-gemara-mcp:3000/mcp"
            {{- end }}
            {{- if .Values.mcpServers.oras.enabled }}
            - name: ORAS_MCP_URL
              value: "http://studio-oras-mcp:3000/mcp"
            {{- end }}
            {{- if .Values.registry.enabled }}
            - name: REGISTRY_INSECURE
              value: "studio-registry:{{ .Values.registry.service.port }}"
            {{- end }}
            {{- if .Values.auth.apiTokenSecretName }}
            - name: STUDIO_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.apiTokenSecretName }}
                  key: {{ .Values.auth.apiTokenSecretKey | default "api-token" }}
            {{- else if .Values.auth.apiToken }}
            - name: STUDIO_API_TOKEN
              value: {{ .Values.auth.apiToken | quote }}
            {{- end }}
            {{- /*
              PROXY_SECRET activates StripUntrustedProxyHeaders — requires the
              proxy to send X-Proxy-Secret on every request. OAuth2 Proxy cannot
              inject custom upstream headers, so this is disabled for the sidecar
              pattern. Trust is network-enforced: port 8080 is pod-internal only.
              Enable manually for reverse-proxy deployments (Envoy/nginx) that
              can add the header.
            */ -}}
            {{- if .Values.auth.proxySecret }}
            - name: PROXY_SECRET
              value: {{ .Values.auth.proxySecret | quote }}
            {{- end }}
            - name: MODEL_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: MODEL_NAME
              value: {{ .Values.model.name | quote }}
            {{- if .Values.blobStorage.enabled }}
            - name: BLOB_ENDPOINT
              value: {{ .Values.blobStorage.endpoint | quote }}
            - name: BLOB_BUCKET
              value: {{ .Values.blobStorage.bucket | quote }}
            - name: BLOB_USE_SSL
              value: {{ .Values.blobStorage.useSSL | quote }}
            - name: BLOB_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blobStorage.secretName }}
                  key: access-key
            - name: BLOB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blobStorage.secretName }}
                  key: secret-key
            {{- end }}
            {{- if .Values.postgres.auth.existingSecret }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecret }}
                  key: password
            - name: POSTGRES_URL
              value: "postgres://{{ .Values.postgres.auth.user }}:$(POSTGRES_PASSWORD)@studio-postgres:5432/{{ .Values.postgres.auth.database }}?sslmode={{ .Values.postgres.auth.sslmode | default "disable" }}"
            {{- else }}
            - name: POSTGRES_URL
              value: "postgres://{{ .Values.postgres.auth.user }}:{{ .Values.postgres.auth.password }}@studio-postgres:5432/{{ .Values.postgres.auth.database }}?sslmode={{ .Values.postgres.auth.sslmode | default "disable" }}"
            {{- end }}
            - name: AUTO_PERSIST_ARTIFACTS
              value: {{ .Values.gateway.autoPersistArtifacts | default true | quote }}
            - name: NATS_URL
              value: "nats://studio-nats:4222"
            - name: NETWORKPOLICY_ENFORCED
              value: "true"
            {{- if .Values.registry.credentials.secretName }}
            - name: REGISTRY_CREDENTIALS_FILE
              value: "/etc/registry-credentials/credentials.json"
            {{- end }}
          {{- if .Values.registry.credentials.secretName }}
          volumeMounts:
            - name: registry-credentials
              mountPath: /etc/registry-credentials
              readOnly: true
          {{- end }}
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
        {{- if .Values.auth.oauth2Proxy.enabled }}
        - name: oauth2-proxy
          image: "{{ .Values.auth.oauth2Proxy.image.repository }}:{{ .Values.auth.oauth2Proxy.image.tag }}"
          args:
            - --provider={{ .Values.auth.oauth2Proxy.provider }}
            - --oidc-issuer-url={{ .Values.auth.oauth2Proxy.issuerUrl }}
            - --client-id={{ .Values.auth.oauth2Proxy.clientId }}
            - --client-secret-file=/etc/oauth2-proxy/client-secret
            - --redirect-url={{ .Values.auth.oauth2Proxy.callbackUrl }}
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --cookie-secure={{ .Values.auth.oauth2Proxy.cookieSecure }}
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --code-challenge-method=S256
            - --skip-provider-button=true
            - --email-domain={{ join "," .Values.auth.oauth2Proxy.emailDomains }}
            - --scope={{ .Values.auth.oauth2Proxy.scopes }}
            - --skip-auth-route=GET=/healthz
            - --skip-auth-route=GET=/auth/logged-out
            {{- range .Values.auth.oauth2Proxy.allowedGroups }}
            - --allowed-group={{ . }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.cookieSecretName | default "studio-cookie-secret" }}
                  key: cookie-secret
          ports:
            - name: proxy
              containerPort: 4180
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 10
          volumeMounts:
            - name: oauth2-proxy-secret
              mountPath: /etc/oauth2-proxy
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        {{- end }}
      {{- if or .Values.auth.oauth2Proxy.enabled .Values.registry.credentials.secretName }}
      volumes:
        {{- if .Values.auth.oauth2Proxy.enabled }}
        - name: oauth2-proxy-secret
          secret:
            secretName: {{ .Values.auth.oauth2Proxy.secretName }}
            items:
              - key: {{ .Values.auth.oauth2Proxy.secretKey }}
                path: client-secret
        {{- end }}
        {{- if .Values.registry.credentials.secretName }}
        - name: registry-credentials
          secret:
            secretName: {{ .Values.registry.credentials.secretName }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      {{- if .Values.auth.oauth2Proxy.enabled }}
      targetPort: 4180
      {{- else }}
      targetPort: 8080
      {{- end }}
      protocol: TCP
---
# Internal Service — agent-only traffic. Not exposed via Ingress.
# Access restricted by studio-allow-gateway-internal NetworkPolicy.
# See docs/decisions/internal-endpoint-isolation.md.
apiVersion: v1
kind: Service
metadata:
  name: studio-gateway-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: internal
      port: 8081
      targetPort: 8081
      protocol: TCP
