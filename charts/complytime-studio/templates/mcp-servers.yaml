# SPDX-License-Identifier: Apache-2.0
#
# MCP servers deployed via kagent MCPServer CRDs.
# oras-mcp uses stdio — OBO handled via gateway proxy (/api/registry/*).
# Platform servers (gemara, postgres, clickhouse) use stdio with static credentials.
{{- if .Values.mcpServers.gemara.enabled }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-gemara-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.mcpServers.gemara.image }}
    cmd: /bin/gemara-mcp
    args:
      - serve
    port: 3000
{{- end }}
{{- if .Values.mcpServers.oras.enabled }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-oras-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.mcpServers.oras.image }}
    cmd: /bin/oras-mcp
    args:
      - serve
    port: 3000
{{- end }}
{{- if .Values.postgres.enabled }}
---
# NOTE: kagent MCPServer env is map[string]string — no valueFrom/secretKeyRef.
# When postgres.auth.existingSecret is used, values.postgres.auth.password must
# still be set to the same credential for the MCP server.  This mirrors the
# ClickHouse MCP pattern.  Track kagent enhancement for native Secret env support.
#
# NOTE: kagent MCPServer CRD does not expose resources/limits or probes.
# Resource constraints must be configured at the kagent controller level.
#
# PRODUCTION: Set PGEDGE_DB_SSLMODE to "require" or "verify-full" when
# connecting to a PostgreSQL instance with TLS enabled.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-postgres-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.postgres.mcp.image.repository }}:{{ .Values.postgres.mcp.image.tag }}
    cmd: /app/init-server.sh
    port: 3000
    env:
      PGEDGE_DB_HOST: "studio-postgres.{{ .Release.Namespace }}"
      PGEDGE_DB_PORT: "5432"
      PGEDGE_DB_NAME: {{ .Values.postgres.auth.database | quote }}
      PGEDGE_DB_USER: {{ .Values.postgres.auth.user | quote }}
      PGEDGE_DB_PASSWORD: {{ .Values.postgres.auth.password | quote }}
      PGEDGE_DB_SSLMODE: "disable"
      PGEDGE_DB_ALLOW_WRITES: "false"
{{- end }}
{{- if and .Values.clickhouse.enabled .Values.clickhouse.mcp }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-clickhouse-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.clickhouse.mcp.image.repository }}:{{ .Values.clickhouse.mcp.image.tag }}
    cmd: python
    args:
      - "-m"
      - "mcp_clickhouse.main"
    port: 3000
    env:
      CLICKHOUSE_HOST: "studio-clickhouse.{{ .Release.Namespace }}"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_USER: {{ .Values.clickhouse.auth.readerUser | quote }}
      CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.readerPassword | quote }}
      OPENBLAS_NUM_THREADS: "1"
    secretRefs:
      - name: studio-clickhouse-credentials
{{- end }}
{{- /* github-mcp removed — not required for audit dashboard workflow. */ -}}
