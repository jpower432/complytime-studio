# SPDX-License-Identifier: Apache-2.0
#
# MCP servers deployed via kagent MCPServer CRDs.
# oras-mcp uses stdio — OBO handled via gateway proxy (/api/registry/*).
# Platform servers (gemara, postgres, clickhouse) use stdio with static credentials.
{{- if .Values.mcpServers.gemara.enabled }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-gemara-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.mcpServers.gemara.image }}
    cmd: /bin/gemara-mcp
    args:
      - serve
    port: 3000
{{- end }}
{{- if .Values.mcpServers.oras.enabled }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-oras-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.mcpServers.oras.image }}
    cmd: /bin/oras-mcp
    args:
      - serve
    port: 3000
{{- end }}
{{- if .Values.postgres.enabled }}
---
# NOTE: kagent MCPServer CRD env is map[string]string — no valueFrom/secretKeyRef.
# When postgres.auth.existingSecret is used, values.postgres.auth.password must
# still match the Secret for this URL.
#
# Domain resources + typed tools — replaces pgEdge postgres-mcp for agents.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.studioMcp.image.repository }}:{{ .Values.studioMcp.image.tag }}
    cmd: /studio-mcp
    args:
      - --transport=http
      - --port=3000
      - --postgres-url=postgres://{{ .Values.postgres.auth.user }}:{{ .Values.postgres.auth.password }}@studio-postgres.{{ .Release.Namespace }}:5432/{{ .Values.postgres.auth.database }}?sslmode={{ .Values.postgres.auth.sslmode | default "disable" }}
    port: 3000
{{- end }}
{{- if and .Values.clickhouse.enabled .Values.clickhouse.mcp }}
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: studio-clickhouse-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: {{ .Values.clickhouse.mcp.image.repository }}:{{ .Values.clickhouse.mcp.image.tag }}
    cmd: python
    args:
      - "-m"
      - "mcp_clickhouse.main"
    port: 3000
    env:
      CLICKHOUSE_HOST: "studio-clickhouse.{{ .Release.Namespace }}"
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_USER: {{ .Values.clickhouse.auth.readerUser | quote }}
      CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.readerPassword | quote }}
      OPENBLAS_NUM_THREADS: "1"
    secretRefs:
      - name: studio-clickhouse-credentials
{{- end }}
{{- /* github-mcp removed — not required for audit dashboard workflow. */ -}}
