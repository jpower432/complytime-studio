# NATS server for event-driven evidence processing.
# Gated by nats.enabled. Single-node, no JetStream.
{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    app.kubernetes.io/name: studio-nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studio-nats
  template:
    metadata:
      labels:
        {{- include "studio.labels" . | nindent 8 }}
        app.kubernetes.io/name: studio-nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio-nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    app.kubernetes.io/name: studio-nats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: studio-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      protocol: TCP
{{- end }}
