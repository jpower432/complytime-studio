# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet -tags dev ./...
      - name: Test
        run: go test -tags dev -v -race -cover ./...
      - name: Build gateway
        run: go build -o /dev/null ./cmd/gateway/
      - name: Build studio-mcp
        run: go build -o /dev/null ./cmd/studio-mcp/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --build-tags dev
