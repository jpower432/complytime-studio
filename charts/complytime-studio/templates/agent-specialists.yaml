  type: Declarative
  skills:
    gitRefs:
      - url: {{ .Values.platformRepo }}
        ref: main
        path: skills/gemara-layers
      - url: {{ .Values.platformRepo }}
        ref: main
        path: skills/policy-risk-linkage
      {{- if .Values.externalSkills.assessmentDefaults.enabled }}
      - url: {{ .Values.externalSkills.assessmentDefaults.repo }}
        ref: {{ .Values.externalSkills.assessmentDefaults.ref }}
        path: {{ .Values.externalSkills.assessmentDefaults.path }}
      {{- end }}
  declarative:
    runtime: go
    modelConfig: studio-model
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: studio-platform-prompts
          alias: platform
    systemMessage: |
      {{`{{include "platform/platform"}}`}}

      ---

{{ .Files.Get "agents/policy-composer/prompt.md" | indent 6 }}
    tools:
      {{- if .Values.mcpServers.gemara.enabled }}
      - type: McpServer
        mcpServer:
          name: studio-gemara-mcp
          kind: MCPServer
        toolNames:
          - validate_gemara_artifact
          - migrate_gemara_artifact
      {{- end }}
      {{- if .Values.mcpServers.github.enabled }}
      - type: McpServer
        mcpServer:
          name: studio-github-mcp
          kind: MCPServer
        toolNames:
          - get_file_contents
          - search_code
          - search_repositories
        allowedHeaders:
          - Authorization
      {{- end }}
    a2aConfig:
      skills:
        - id: policy-authoring
          name: Policy Authoring
          description: "Compose a RiskCatalog and Policy from ThreatCatalog and ControlCatalog inputs through guided conversation."
          tags: ["policy", "risk", "compliance", "layer-3"]
