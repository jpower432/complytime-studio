# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "studio.labels" . | nindent 8 }}
        {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: public
              containerPort: 8080
              protocol: TCP
            - name: internal
              containerPort: 8081
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          env:
            - name: PORT
              value: "8080"
            - name: INTERNAL_PORT
              value: "8081"
            - name: GITHUB_ORG
              value: {{ .Values.github.org | quote }}
            - name: GITHUB_REPO
              value: {{ .Values.github.repo | quote }}
            - name: AGENT_DIRECTORY
              value: >-
                {{- $enriched := list -}}
                {{- range .Values.agentDirectory -}}
                {{- $shortName := trimPrefix "studio-" .name -}}
                {{- $agentOverride := dict -}}
                {{- if hasKey $.Values.agents $shortName -}}
                {{- $agentOverride = index $.Values.agents $shortName -}}
                {{- end -}}
                {{- $agentModel := dict -}}
                {{- if hasKey $agentOverride "model" -}}
                {{- $agentModel = $agentOverride.model -}}
                {{- end -}}
                {{- $provider := default $.Values.model.provider (index $agentModel "provider" | default "") -}}
                {{- $modelName := default $.Values.model.name (index $agentModel "name" | default "") -}}
                {{- $entry := merge (dict "model" (dict "provider" $provider "name" $modelName)) (deepCopy .) -}}
                {{- $enriched = append $enriched $entry -}}
                {{- end }}
                {{ $enriched | toJson }}
            - name: KAGENT_A2A_URL
              value: {{ .Values.kagent.a2aURL | quote }}
            - name: KAGENT_AGENT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- if .Values.mcpServers.gemara.enabled }}
            - name: GEMARA_MCP_URL
              value: "http://studio-gemara-mcp:3000/mcp"
            {{- end }}
            {{- if .Values.mcpServers.oras.enabled }}
            - name: ORAS_MCP_URL
              value: "http://studio-oras-mcp:3000/mcp"
            {{- end }}
            {{- if .Values.registry.enabled }}
            - name: REGISTRY_INSECURE
              value: "studio-registry:{{ .Values.registry.service.port }}"
            {{- end }}
            {{- if .Values.auth.oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.auth.oidc.issuerUrl | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.auth.oidc.clientId | quote }}
            {{- if .Values.auth.oidc.secretName }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.oidc.secretName }}
                  key: {{ .Values.auth.oidc.secretKey }}
            {{- end }}
            - name: OIDC_CALLBACK_URL
              value: {{ .Values.auth.oidc.callbackUrl | quote }}
            - name: OIDC_SCOPES
              value: {{ .Values.auth.oidc.scopes | quote }}
            {{- if .Values.auth.oidc.rolesClaim }}
            - name: OIDC_ROLES_CLAIM
              value: {{ .Values.auth.oidc.rolesClaim | quote }}
            {{- end }}
            {{- if .Values.auth.oidc.bootstrapEmails }}
            - name: OIDC_BOOTSTRAP_EMAILS
              value: {{ join "," .Values.auth.oidc.bootstrapEmails | quote }}
            {{- end }}
            - name: OIDC_DISCOVERY_REFRESH
              value: {{ .Values.auth.oidc.discoveryRefresh | default "24h" | quote }}
            {{- end }}
            {{- /* DEPRECATED: google.* values map to OIDC_* at runtime with a deprecation warning */}}
            {{- if and .Values.auth.google.clientId (not .Values.auth.oidc.issuerUrl) }}
            - name: GOOGLE_CLIENT_ID
              value: {{ .Values.auth.google.clientId | quote }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.secretName }}
                  key: {{ .Values.auth.google.secretKey }}
            {{- if .Values.auth.google.callbackUrl }}
            - name: GOOGLE_CALLBACK_URL
              value: {{ .Values.auth.google.callbackUrl | quote }}
            {{- end }}
            {{- end }}
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.cookieSecretName | default "studio-cookie-secret" }}
                  key: cookie-secret
            {{- if .Values.auth.apiToken }}
            - name: STUDIO_API_TOKEN
              value: {{ .Values.auth.apiToken | quote }}
            {{- end }}
            - name: MODEL_PROVIDER
              value: {{ .Values.model.provider | quote }}
            - name: MODEL_NAME
              value: {{ .Values.model.name | quote }}
            {{- if .Values.blobStorage.enabled }}
            - name: BLOB_ENDPOINT
              value: {{ .Values.blobStorage.endpoint | quote }}
            - name: BLOB_BUCKET
              value: {{ .Values.blobStorage.bucket | quote }}
            - name: BLOB_USE_SSL
              value: {{ .Values.blobStorage.useSSL | quote }}
            - name: BLOB_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blobStorage.secretName }}
                  key: access-key
            - name: BLOB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blobStorage.secretName }}
                  key: secret-key
            {{- end }}
            {{- if .Values.clickhouse.enabled }}
            - name: CLICKHOUSE_ADDR
              value: "studio-clickhouse:9000"
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              {{- if .Values.clickhouse.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.auth.existingSecret }}
                  key: password
              {{- else }}
              value: {{ .Values.clickhouse.auth.password | quote }}
              {{- end }}
            {{- end }}
            - name: AUTO_PERSIST_ARTIFACTS
              value: {{ .Values.gateway.autoPersistArtifacts | default true | quote }}
            {{- if .Values.nats.enabled }}
            - name: NATS_URL
              value: "nats://studio-nats:4222"
            - name: NETWORKPOLICY_ENFORCED
              value: "true"
            {{- end }}
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: studio-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: public
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# Internal Service — agent-only traffic. Not exposed via Ingress.
# Access restricted by studio-allow-gateway-internal NetworkPolicy.
# See docs/decisions/internal-endpoint-isolation.md.
apiVersion: v1
kind: Service
metadata:
  name: studio-gateway-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "studio.selectorLabels" (dict "component" "gateway" "root" .) | nindent 4 }}
  ports:
    - name: internal
      port: 8081
      targetPort: 8081
      protocol: TCP
