# SPDX-License-Identifier: Apache-2.0
gateway:
  image:
    repository: complytime-gateway
    tag: latest
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
  auth:
    database: core
    user: core
    password: complytime-dev
    readerUser: core_reader
    readerPassword: complytime-reader-dev
  storage:
    size: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

nats:
  enabled: true
  image: nats:2-alpine
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

mcpServer:
  enabled: true
  image:
    repository: complytime-mcp
    tag: latest
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"
