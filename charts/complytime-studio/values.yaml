#
# Default values for complytime-studio — targeting kind development clusters.
# Override with values-openshift.yaml (or equivalent) for production.

# -- Gateway configuration. User-facing entry point serving workbench SPA,
# REST APIs, MCP proxy, and OAuth authentication. A2A proxy is separate.
gateway:
  image:
    repository: studio-gateway
    tag: latest
  autoPersistArtifacts: true

# -- Google OAuth for user authentication.
# Create credentials at https://console.cloud.google.com/apis/credentials
# Authorized redirect URI: http://localhost:8080/auth/callback
auth:
  google:
    clientId: ""
    secretName: studio-oauth-credentials
    secretKey: client-secret
    callbackURL: "http://localhost:8080/auth/callback"
  cookieSecretName: ""
  # Admin email allowlist. When empty, all authenticated users are admins.
  # Viewers can read policies/evidence and chat, but cannot import or upload.
  admins: []
  # Static bearer token for dev/CI seeding (STUDIO_API_TOKEN).
  # Leave empty to disable.
  apiToken: "dev-seed-token"

# -- GitHub organization/user and repository name. Single source of truth
# for platformRepo URL, Chart.yaml home/sources, and workbench links.
github:
  org: jpower432
  repo: complytime-studio

# -- Git URL of this repository, used for internal skill gitRefs.
platformRepo: https://github.com/jpower432/complytime-studio.git

# -- Internal skills from this repo (requires public repo or git credentials).
# Disable when the platformRepo is private and kagent lacks git auth.
internalSkills:
  enabled: false

# -- External skill repositories.
externalSkills:
  research:
    enabled: true
    repo: https://github.com/rhaml-23/prompt.git
    ref: main
    path: skills/research.md
  gemara:
    enabled: true
    repo: https://github.com/rhaml-23/prompt.git
    ref: main
    path: skills/gemara.md

# -- kagent controller settings.
# When a2aURL is set, all A2A traffic routes through the kagent controller.
# Leave empty to route directly to per-agent URLs from agentDirectory (BYO agents).
kagent:
  a2aURL: ""

# -- Standalone A2A reverse proxy. Stateless — no ClickHouse, no session state.
# Scales independently from the gateway for concurrent chat load.
# -- BYO assistant agent. Standalone Python container with MCP sidecars.
assistant:
  image:
    repository: studio-assistant
    tag: latest

# -- Per-agent model overrides. Keys match agent short names from agentDirectory.
# When a key is absent or empty, the agent inherits the global model.* values.
# Example: agents.assistant.model.provider: GeminiVertexAI
agents:
  assistant:
    model:
      provider: GeminiVertexAI
      name: gemini-2.5-pro

# -- Global model configuration. Used as default for all agents unless
# overridden per-agent in agents.<name>.model.
model:
  provider: AnthropicVertexAI
  name: claude-opus-4-6
  # apiKeySecret:
  #   name: studio-model-credentials
  #   key: api-key
  # -- Vertex AI configuration. Shared by all Vertex AI providers
  # (GeminiVertexAI, AnthropicVertexAI). Same project, location, and
  # credentials regardless of which model is selected.
  vertexAI:
    projectID: ""
    location: global
    # Secret containing application_default_credentials.json for GCP auth.
    # Required when running outside GKE (e.g. kind) without workload identity.
    credentialsSecret: studio-gcp-credentials

# -- Agent directory entries exposed via GET /api/agents.
# Single agent — BYO assistant deployed via byo-assistant.yaml.
agentDirectory:
  - name: studio-assistant
    description: "ComplyTime Studio assistant — audit preparation, evidence synthesis, cross-framework coverage analysis, and compliance guidance"
    url: "http://studio-assistant:8080"
    skills:
      - id: compliance-assistant
        name: Studio Assistant
        description: "Audit preparation, evidence synthesis, cross-framework coverage analysis, policy guidance, and AuditLog generation."
        tags: [assistant, audit, compliance, coverage, evidence, layer-7]

# -- MCP servers deployed via kagent MCPServer CRDs.
# Platform servers (gemara, oras, clickhouse) use stdio with static credentials.
mcpServers:
  gemara:
    enabled: true
    # Pin to a release tag in production to ensure reproducible deployments.
    image: ghcr.io/gemaraproj/gemara-mcp:latest
  oras:
    enabled: true
    image: ghcr.io/oras-project/oras-mcp:v0.2.1
  # github-mcp removed — not required for audit dashboard workflow.
  # Re-enable if code search or repository access is needed.

# -- ClickHouse evidence and audit store. Required dependency.
# Stores evidence, policies, mapping documents, and AuditLogs.
clickhouse:
  enabled: true
  image:
    repository: clickhouse/clickhouse-server
    tag: "25.3"
  auth:
    user: default
    # For production, create a Secret externally and reference it via
    # clickhouse.auth.existingSecret. This default is for local dev only.
    password: complytime-dev
    existingSecret: ""
    # Read-only user for clickhouse-mcp (agent queries). SELECT only.
    readerUser: reader
    readerPassword: complytime-reader-dev
  storage:
    size: 2Gi
  retentionMonths: 24
  resources:
    requests:
      memory: "1Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "4"
  mcp:
    image:
      repository: docker.io/mcp/clickhouse
      # Pin to a release tag in production to ensure reproducible deployments.
      tag: latest

# -- Built-in OCI registry (dev only). Disable for production clusters
# where an external registry (Quay, GHCR, etc.) is available.
registry:
  enabled: true
  # Pin to a release tag in production to ensure reproducible deployments.
  image: ghcr.io/project-zot/zot-linux-amd64:latest
  service:
    port: 5000
    type: NodePort
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  seed:
    enabled: true
    image: ghcr.io/oras-project/oras:v1.2.2

# -- NetworkPolicy for Helm-managed studio pods (gateway, registry, clickhouse).
# Agents and MCP servers are managed by kagent/kmcp; their network policies
# should be configured at the kagent level.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium). Kind's default
# kindnet does NOT enforce policies — deploy to a production cluster for enforcement.
networkPolicy:
  enabled: true
