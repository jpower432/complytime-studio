# SPDX-License-Identifier: Apache-2.0
#
# Default values for complytime-studio — production-safe baseline.
# Dev convenience overrides live in values-dev.yaml (layered by the Makefile).
# Override with values-openshift.yaml for OpenShift-specific settings.

# -- Gateway configuration. User-facing entry point serving workbench SPA,
# REST APIs, MCP proxy, and OAuth authentication. A2A proxy is separate.
gateway:
  image:
    repository: studio-gateway
    tag: latest
  autoPersistArtifacts: true

# -- S3-compatible blob storage for evidence attachments.
# When disabled, the gateway omits BLOB_* env vars.
# For kind/dev, enable and point at in-cluster MinIO or RustFS.
blobStorage:
  enabled: false
  endpoint: ""
  bucket: complytime-evidence
  useSSL: false
  secretName: studio-blob-credentials
  # When true, Helm renders templates/blob-secret.yaml (dev only — use external
  # secrets in production).
  createSecret: false
  accessKey: ""
  secretKey: ""

# -- Authentication via OAuth2 Proxy sidecar.
# Handles OIDC discovery, PKCE, JWKS, token refresh, and session cookies.
# Supports any OIDC provider (Keycloak, Okta, Azure AD, Google, Dex, Hydra).
# When disabled (dev mode), the sidecar is omitted. The gateway middleware
# still returns 401 for /api/* requests without X-Forwarded-Email or
# STUDIO_API_TOKEN — set apiToken below for local development.
auth:
  oauth2Proxy:
    enabled: true
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: "v7.15.1"
    # OIDC provider type — "oidc" for generic, "keycloak-oidc" for Keycloak.
    provider: oidc
    # Must expose /.well-known/openid-configuration
    issuerUrl: ""
    clientId: ""
    # Kubernetes Secret containing client-secret and cookie-secret keys.
    secretName: studio-oauth-credentials
    secretKey: client-secret
    callbackUrl: "http://localhost:8080/oauth2/callback"
    scopes: "openid email profile"
    # Set true for production (requires HTTPS).
    cookieSecure: false
    # Restrict login by email domain. ["*"] allows all.
    emailDomains: ["*"]
    # Restrict login by OIDC group claim. [] allows all.
    allowedGroups: []
  # Static bearer token for dev/CI seeding (STUDIO_API_TOKEN).
  # Used by `make seed` to bypass OAuth2 Proxy for data loading.
  # Override with a strong secret in production. Leave empty to disable.
  apiToken: "studio-dev-token"

# -- GitHub organization/user and repository name. Single source of truth
# for platformRepo URL, Chart.yaml home/sources, and workbench links.
github:
  org: jpower432
  repo: complytime-studio

# -- Git URL of this repository, used for internal skill gitRefs.
platformRepo: https://github.com/jpower432/complytime-studio.git

# -- External skill repositories. kagent clones these and mounts them into
# the agent container. To add a new external skill:
#   1. Add an entry here with repo, ref, and path
#   2. Add a matching entry in agents/<name>/agent.yaml skills block
#   3. Run: make sync-prompts
externalSkills:
  research:
    enabled: true
    repo: https://github.com/rhaml-23/prompt.git
    ref: main
    path: skills/research.md
  gemara:
    enabled: true
    repo: https://github.com/rhaml-23/prompt.git
    ref: main
    path: skills/gemara.md

# -- kagent controller settings.
# a2aURL routes all A2A traffic through the kagent controller, which manages
# BYO agent lifecycles and exposes them in the kagent dashboard.
# Set to empty string only for dev environments without kagent installed.
kagent:
  a2aURL: "http://kagent-controller:8083"

# -- Standalone A2A reverse proxy. Stateless — no session state.
# Scales independently from the gateway for concurrent chat load.
# -- BYO assistant agent. Standalone Python container with MCP sidecars.
assistant:
  image:
    repository: studio-assistant
    tag: latest

# -- Per-agent model overrides. Keys match agent short names from agentDirectory.
# When a key is absent or empty, the agent inherits the global model.* values.
# Example: agents.assistant.model.provider: GeminiVertexAI
agents:
  assistant: {}

# -- Global model configuration. Used as default for all agents unless
# overridden per-agent in agents.<name>.model.
model:
  provider: AnthropicVertexAI
  name: claude-opus-4-6
  # apiKeySecret:
  #   name: studio-model-credentials
  #   key: api-key
  # -- Vertex AI configuration. Shared by all Vertex AI providers
  # (GeminiVertexAI, AnthropicVertexAI). Same project, location, and
  # credentials regardless of which model is selected.
  vertexAI:
    projectID: ""
    location: global
    # Secret containing application_default_credentials.json for GCP auth.
    # Required when running outside GKE (e.g. kind) without workload identity.
    credentialsSecret: studio-gcp-credentials

# -- Agent directory entries exposed via GET /api/agents.
# Single agent — BYO assistant deployed via byo-assistant.yaml.
# The skills block MUST mirror agents/<name>/agent.yaml a2a.skills.
agentDirectory:
  - name: studio-assistant
    description: >-
      ComplyTime Studio assistant — audit preparation, evidence synthesis,
      cross-framework coverage analysis, and compliance guidance
    url: "http://studio-assistant:8080"
    skills:
      - id: compliance-assistant
        name: Studio Assistant
        description: >-
          Audit preparation, evidence synthesis, cross-framework coverage
          analysis, policy guidance, and AuditLog generation.
        tags: [assistant, audit, compliance, coverage, evidence, layer-7]

# -- MCP servers deployed via kagent MCPServer CRDs.
# Platform servers (gemara, oras, clickhouse) use stdio with static credentials.
#
# To add a new MCP server:
#   1. Add an entry here with enabled + image
#   2. Create a Helm template in templates/ for the MCPServer CRD
#   3. Add a matching entry in agents/<name>/agent.yaml mcp block with tool whitelist
#   4. For user-scoped auth, set allowedHeaders: [Authorization] on the agent mcp ref
#
# Transport modes:
#   stdio  — static credentials, agent and MCP server share a pod (sidecar)
#   http   — per-request auth via Authorization header propagation (OBO flow)
mcpServers:
  gemara:
    enabled: true
    image: ghcr.io/gemaraproj/gemara-mcp:0.3.0
  oras:
    enabled: true
    image: ghcr.io/oras-project/oras-mcp:v0.2.1
  # github-mcp removed — not required for audit dashboard workflow.
  # Re-enable if code search or repository access is needed.

# -- ClickHouse. Disabled by default. Enable for production deployments
# where evidence volume exceeds PostgreSQL capacity. When enabled, the
# operator configures pg_clickhouse FDW to route evidence queries to
# ClickHouse transparently. See docs/decisions/postgres-with-extensions.md.
clickhouse:
  enabled: false
  image:
    repository: clickhouse/clickhouse-server
    tag: "25.3"
  auth:
    user: default
    password: complytime-dev
    existingSecret: ""
    readerUser: reader
    readerPassword: complytime-reader-dev
  storage:
    size: 2Gi
  retentionMonths: 24
  resources:
    requests:
      memory: "1Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "4"
  mcp:
    image:
      repository: docker.io/mcp/clickhouse
      tag: latest

# -- PostgreSQL. Required. Single application database for all data:
# programs, users, evidence, policies, audit logs, certifications, mappings.
# For production evidence scaling, enable ClickHouse above and configure
# pg_clickhouse FDW for transparent query pushdown.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17"
  auth:
    database: studio
    user: studio
    password: complytime-dev  # dev only — use existingSecret for production
    existingSecret: ""
    sslmode: disable  # Use "require" or "verify-full" for production
  storage:
    size: 1Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  mcp:
    image:
      repository: ghcr.io/pgedge/postgres-mcp
      tag: latest

# -- Built-in OCI registry (dev only). Disable for production clusters
# where an external registry (Quay, GHCR, etc.) is available.
registry:
  enabled: true
  # Pin to a release tag in production to ensure reproducible deployments.
  image: ghcr.io/project-zot/zot-linux-amd64:latest
  service:
    port: 5000
    type: NodePort
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  seed:
    enabled: true
    image: ghcr.io/oras-project/oras:v1.2.2
  # Operator-configured read-only credentials for external registries.
  # When set, the Secret is mounted into the gateway and read at startup.
  # Format: JSON object mapping host -> read-only token.
  # Example: {"ghcr.io": "ghp_readonly...", "quay.io": "quay_token..."}
  credentials:
    secretName: ""

# -- NATS lightweight messaging — required by the gateway for the
# certification pipeline and draft-audit-log notifications.
# The gateway exits if NATS_URL is not set.
# NATS is CNCF-graduated. Single-node, no JetStream — minimal footprint.
nats:
  enabled: true
  image: nats:2-alpine
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# -- NetworkPolicy for Helm-managed studio pods (gateway, registry, clickhouse).
# Agents and MCP servers are managed by kagent/kmcp; their network policies
# should be configured at the kagent level.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium). Kind's default
# kindnet does NOT enforce policies — deploy to a production cluster for enforcement.
networkPolicy:
  enabled: true
