# SPDX-License-Identifier: Apache-2.0
# Standalone A2A reverse proxy — stateless, no ClickHouse, no session state.
# Optional: when disabled, the gateway handles A2A routing directly.
{{- if .Values.a2aProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-a2a-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: a2a-proxy
spec:
  replicas: {{ .Values.a2aProxy.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: a2a-proxy
  template:
    metadata:
      labels:
        {{- include "studio.labels" . | nindent 8 }}
        app.kubernetes.io/component: a2a-proxy
    spec:
      containers:
        - name: proxy
          image: "{{ .Values.a2aProxy.image.repository }}:{{ .Values.a2aProxy.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: PORT
              value: "8081"
            - name: AGENT_DIRECTORY
              value: >-
                {{- $enriched := list -}}
                {{- range .Values.agentDirectory -}}
                {{- $shortName := trimPrefix "studio-" .name -}}
                {{- $agentOverride := dict -}}
                {{- if hasKey $.Values.agents $shortName -}}
                {{- $agentOverride = index $.Values.agents $shortName -}}
                {{- end -}}
                {{- $agentModel := dict -}}
                {{- if hasKey $agentOverride "model" -}}
                {{- $agentModel = $agentOverride.model -}}
                {{- end -}}
                {{- $provider := default $.Values.model.provider (index $agentModel "provider" | default "") -}}
                {{- $modelName := default $.Values.model.name (index $agentModel "name" | default "") -}}
                {{- $entry := merge (dict "model" (dict "provider" $provider "name" $modelName)) (deepCopy .) -}}
                {{- $enriched = append $enriched $entry -}}
                {{- end }}
                {{ $enriched | toJson }}
            - name: KAGENT_A2A_URL
              value: {{ .Values.kagent.a2aURL | quote }}
            - name: KAGENT_AGENT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: studio-a2a-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: a2a-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: a2a-proxy
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
{{- end }}
