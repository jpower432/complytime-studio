title: SOC 2 Trust Services Criteria
metadata:
  id: soc2-tsc
  type: GuidanceCatalog
  gemara-version: "1.0.0"
  description: SOC 2 Trust Services Criteria covering Common Criteria CC6, CC7, and CC8
  version: "2017"
  author:
    id: aicpa
    name: AICPA
    type: Human
type: Standard
front-matter: >-
  Trust Services Criteria for Security, Availability, Processing Integrity,
  Confidentiality, and Privacy (2017 revision).
groups:
  - id: CC6
    title: Logical and Physical Access Controls
    description: Criteria related to logical and physical access to systems and data.
  - id: CC7
    title: System Operations
    description: Criteria related to managing system operations and detecting anomalies.
  - id: CC8
    title: Change Management
    description: Criteria related to managing changes to infrastructure and software.

guidelines:
  - id: CC6.1
    title: Logical Access Security
    objective: >-
      The entity implements logical access security software, infrastructure,
      and architectures over protected information assets to protect them
      from security events.
    group: CC6
    state: Active
    recommendations:
      - Implement access control lists and role-based access.
      - Enforce multi-factor authentication for privileged access.
    applicability: []
  - id: CC6.2
    title: User Authentication
    objective: >-
      Prior to issuing system credentials and granting system access, the
      entity registers and authorizes new internal and external users.
    group: CC6
    state: Active
    recommendations:
      - Verify identity before provisioning access.
      - Implement automated onboarding/offboarding workflows.
    applicability: []
  - id: CC6.3
    title: Role-Based Access
    objective: >-
      The entity authorizes, modifies, or removes access to data, software,
      functions, and other protected information assets based on roles.
    group: CC6
    state: Active
    recommendations:
      - Define roles with least-privilege access.
      - Review role assignments periodically.
    applicability: []
  - id: CC7.1
    title: Monitoring Infrastructure
    objective: >-
      To meet its objectives, the entity uses detection and monitoring
      procedures to identify changes to configurations that result in
      the introduction of new vulnerabilities.
    group: CC7
    state: Active
    recommendations:
      - Deploy intrusion detection systems.
      - Monitor configuration drift continuously.
    applicability: []
  - id: CC7.2
    title: Anomaly Detection
    objective: >-
      The entity monitors system components for anomalies that are indicative
      of malicious acts, natural disasters, and errors affecting the entity's
      ability to meet its objectives.
    group: CC7
    state: Active
    recommendations:
      - Implement SIEM or equivalent log analysis.
      - Define alerting thresholds for anomalous activity.
    applicability: []
  - id: CC8.1
    title: Change Authorization
    objective: >-
      The entity authorizes, designs, develops or acquires, configures,
      documents, tests, approves, and implements changes to infrastructure,
      data, software, and procedures to meet its objectives.
    group: CC8
    state: Active
    recommendations:
      - Require approval before deploying changes to production.
      - Maintain change logs and audit trails.
    applicability: []
