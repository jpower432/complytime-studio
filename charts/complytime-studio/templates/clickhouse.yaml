# SPDX-License-Identifier: Apache-2.0
{{- if .Values.clickhouse.enabled }}
{{- $labels := include "studio.labels" . -}}
{{- $selectorLabels := include "studio.selectorLabels" (dict "component" "studio-clickhouse" "root" .) -}}
{{- $chSecretName := .Values.clickhouse.auth.existingSecret | default "studio-clickhouse-credentials" -}}
{{- if not .Values.clickhouse.auth.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: studio-clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  CLICKHOUSE_USER: {{ .Values.clickhouse.auth.user | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.password | quote }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
    {{- $selectorLabels | nindent 4 }}
spec:
  selector:
    {{- $selectorLabels | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: studio-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
    {{- $selectorLabels | nindent 4 }}
spec:
  serviceName: studio-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- $selectorLabels | nindent 6 }}
  template:
    metadata:
      labels:
        {{- $labels | nindent 8 }}
        {{- $selectorLabels | nindent 8 }}
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $chSecretName }}
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $chSecretName }}
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              value: default
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config-override
              mountPath: /etc/clickhouse-server/config.d/low_resource_config.xml
              subPath: low_resource_config.xml
            - name: config-override
              mountPath: /etc/clickhouse-server/users.d/users_override.xml
              subPath: users_override.xml
          resources:
            requests:
              memory: {{ .Values.clickhouse.resources.requests.memory | quote }}
              cpu: {{ .Values.clickhouse.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.clickhouse.resources.limits.memory | quote }}
              cpu: {{ .Values.clickhouse.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            failureThreshold: 3
          # ClickHouse entrypoint requires chown + gosu (setuid) on data dirs.
          # Restricting capabilities breaks the official image's startup sequence.
      volumes:
        - name: config-override
          configMap:
            name: studio-clickhouse-schema
            items:
              - key: low_resource_config.xml
                path: low_resource_config.xml
              - key: users_override.xml
                path: users_override.xml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage.size | quote }}
{{- end }}
