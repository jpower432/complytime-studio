#
# Local development stack — platform (gateway) + studio (SPA) + MCP servers.
# Agents are kagent Declarative CRDs; they run in Kubernetes, not here.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GEMARA_MCP_URL: http://gemara-mcp:3000
      ORAS_MCP_URL: http://oras-mcp:3000
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: complytime-dev
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - gemara-mcp
      - oras-mcp
      - clickhouse

  studio:
    build:
      context: ./studio
    ports:
      - "3000:80"
    environment:
      PLATFORM_URL: http://gateway:8080

  gemara-mcp:
    build:
      context: .
      dockerfile: Dockerfile.gemara-mcp
    command: ["--host", "0.0.0.0", "--port", "3000", "--pass-environment", "gemara-mcp", "serve"]
    expose:
      - "3000"

  oras-mcp:
    image: ghcr.io/oras-project/oras-mcp:main
    command: ["/bin/oras-mcp", "serve", "--transport", "sse", "--port", "3000"]
    expose:
      - "3000"

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:25.3
    environment:
      CLICKHOUSE_PASSWORD: complytime-dev
    ports:
      - "8123:8123"
      - "9000:9000"

  studio-mcp:
    build:
      context: .
      dockerfile: Dockerfile.studio-mcp
    command:
      - --transport=http
      - --port=3000
      - --clickhouse-addr=clickhouse:9000
      - --clickhouse-user=default
      - --clickhouse-password=complytime-dev
    expose:
      - "3000"
    depends_on:
      - clickhouse
