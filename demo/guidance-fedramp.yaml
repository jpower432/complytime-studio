title: FedRAMP Moderate Baseline Controls
metadata:
  id: fedramp-moderate
  type: GuidanceCatalog
  gemara-version: "1.0.0"
  description: FedRAMP Moderate baseline controls from Access Control (AC) and System and Communications Protection (SC) families
  version: Rev5
  author:
    id: fedramp
    name: FedRAMP PMO
    type: Human
type: Standard
front-matter: >-
  Selected controls from the FedRAMP Moderate baseline (NIST SP 800-53 Rev 5)
  covering Access Control and System/Communications Protection families.
groups:
  - id: AC
    title: Access Control
    description: Controls for managing access to information systems and data.
  - id: SC
    title: System and Communications Protection
    description: Controls for protecting system communications and information at rest.

guidelines:
  - id: AC-3
    title: Access Enforcement
    objective: >-
      The information system enforces approved authorizations for logical
      access to information and system resources in accordance with
      applicable access control policies.
    group: AC
    state: Active
    recommendations:
      - Enforce access control at application and infrastructure layers.
      - Deny by default; allow by explicit grant.
    applicability: []
  - id: AC-6
    title: Least Privilege
    objective: >-
      The organization employs the principle of least privilege, allowing
      only authorized accesses for users which are necessary to accomplish
      assigned tasks.
    group: AC
    state: Active
    recommendations:
      - Grant minimum permissions required for each role.
      - Review and revoke unnecessary privileges periodically.
    applicability: []
  - id: AC-17
    title: Remote Access
    objective: >-
      The organization establishes and documents usage restrictions,
      configuration/connection requirements, and implementation guidance
      for each type of remote access allowed.
    group: AC
    state: Active
    recommendations:
      - Require VPN or zero-trust network access for remote connections.
      - Enforce MFA for all remote sessions.
    applicability: []
  - id: SC-7
    title: Boundary Protection
    objective: >-
      The information system monitors and controls communications at the
      external boundary and at key internal boundaries within the system.
    group: SC
    state: Active
    recommendations:
      - Implement network segmentation and firewall rules.
      - Monitor traffic at all trust boundaries.
    applicability: []
  - id: SC-28
    title: Protection of Information at Rest
    objective: >-
      The information system protects the confidentiality and integrity
      of information at rest.
    group: SC
    state: Active
    recommendations:
      - Encrypt sensitive data at rest using AES-256 or equivalent.
      - Manage encryption keys through a dedicated KMS.
    applicability: []
