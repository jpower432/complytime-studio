server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Runtime config — never cache so env changes take effect immediately.
    location = /env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed static assets — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history-mode fallback — serve index.html for all non-file paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
