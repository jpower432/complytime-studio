#
# Default values for complytime-studio — targeting kind development clusters.
# Override with values-openshift.yaml (or equivalent) for production.

# -- Gateway configuration. User-facing entry point serving workbench SPA,
# REST proxies, A2A reverse proxy, and OAuth authentication.
gateway:
  image:
    repository: studio-gateway
    tag: latest

# -- GitHub OAuth App for user authentication.
# Register at https://github.com/settings/applications/new
auth:
  github:
    clientId: ""
    secretName: studio-oauth-credentials
    secretKey: client-secret
    callbackURL: "http://localhost:8080/auth/callback"

# -- GitHub organization/user and repository name. Single source of truth
# for platformRepo URL, Chart.yaml home/sources, and workbench links.
github:
  org: jpower432
  repo: complytime-studio

# -- Git URL of this repository, used for internal skill gitRefs.
platformRepo: https://github.com/jpower432/complytime-studio.git

# -- Internal skills from this repo (requires public repo or git credentials).
# Disable when the platformRepo is private and kagent lacks git auth.
internalSkills:
  enabled: false

# -- External skill repositories. Disabled by default (placeholders).
# Enable once the external repos exist.
externalSkills:
  stride:
    enabled: false
    repo: https://github.com/openssf/stride-skills.git
    ref: main
    path: skills/stride-analysis
  auditClassification:
    enabled: false
    repo: https://github.com/gemaraproj/gemara-skills.git
    ref: main
    path: skills/audit-classification
  assessmentDefaults:
    enabled: false
    repo: https://github.com/gemaraproj/gemara-skills.git
    ref: main
    path: skills/assessment-defaults

# -- kagent controller settings.
# The gateway proxies A2A requests through the controller (port 8083).
kagent:
  # Base URL for the kagent controller A2A endpoint.
  # When set, all A2A traffic routes through the controller.
  # When empty, falls back to direct per-agent URLs from agentDirectory.
  a2aURL: "http://kagent-controller.kagent:8083"

# -- Per-agent model overrides. Keys match agent short names from agentDirectory.
# When a key is absent or empty, the agent inherits the global model.* values.
# Example: agents.gap-analyst.model.provider: GeminiVertexAI
agents:
  threat-modeler: {}
  gap-analyst: {}
  policy-composer: {}

# -- Global model configuration. Used as default for all agents unless
# overridden per-agent in agents.<name>.model.
model:
  provider: GeminiVertexAI
  name: gemini-2.5-pro
  # apiKeySecret:
  #   name: studio-model-credentials
  #   key: api-key
  anthropicVertexAI:
    projectID: ""
    location: us-east5
    # Secret containing application_default_credentials.json for GCP auth.
    # Required when running outside GKE (e.g. kind) without workload identity.
    credentialsSecret: studio-gcp-credentials
  # -- Gemini via Vertex AI. Use with provider: GeminiVertexAI.
  # Reuses the same credentialsSecret as anthropicVertexAI.
  geminiVertexAI:
    projectID: ""
    location: us-central1

# -- Agent directory entries exposed via GET /api/agents.
# Each entry maps to a deployed Declarative agent's A2A endpoint.
agentDirectory:
  - name: studio-threat-modeler
    description: "STRIDE-based threat analysis, ThreatCatalog and ControlCatalog authoring"
    url: "http://studio-threat-modeler:8080"
    skills:
      - id: threat-assessment
        name: STRIDE Threat Assessment
        description: "Analyze threats using STRIDE. Produces CapabilityCatalog and ThreatCatalog."
        tags: [stride, threats, capabilities, layer-2]
      - id: control-authoring
        name: Control Catalog Authoring
        description: "Author a ControlCatalog that mitigates identified threats with assessment requirements."
        tags: [controls, assessment-requirements, layer-2]
  - name: studio-gap-analyst
    description: "Combined audit preparation — multi-target evidence synthesis, cross-framework coverage analysis via MappingDocuments"
    url: "http://studio-gap-analyst:8080"
    skills:
      - id: gap-analysis
        name: Combined Audit Preparation
        description: "Prepare for combined audits — derive target inventory from evidence, assess criteria coverage per target, translate to external frameworks via MappingDocuments."
        tags: [gap-analysis, audit, compliance, coverage, combined-audit, layer-7]
  - name: studio-policy-composer
    description: "RiskCatalog and Policy authoring from threat modeling outputs"
    url: "http://studio-policy-composer:8080"
    skills:
      - id: policy-authoring
        name: Policy Authoring
        description: "Compose RiskCatalog and Policy from ThreatCatalog and ControlCatalog inputs."
        tags: [policy, risk, compliance, layer-3]

# -- MCP servers deployed via kagent MCPServer CRDs.
# github-mcp uses http transport for per-request OBO token auth.
# Platform servers (gemara, oras, clickhouse) use stdio with static credentials.
mcpServers:
  gemara:
    enabled: true
    # Pin to a release tag in production to ensure reproducible deployments.
    image: ghcr.io/gemaraproj/gemara-mcp:latest
  oras:
    enabled: true
    image: ghcr.io/oras-project/oras-mcp:v0.2.1
  github:
    enabled: true
    # Pin to a release tag in production to ensure reproducible deployments.
    image: ghcr.io/github/github-mcp-server:latest
    # Kubernetes Secret name containing GITHUB_PERSONAL_ACCESS_TOKEN.
    # Required until kagent supports per-request OBO header propagation.
    # Create with: kubectl create secret generic studio-github-token -n kagent \
    #   --from-literal=GITHUB_PERSONAL_ACCESS_TOKEN=ghp_...
    tokenSecret: "studio-github-token"

# -- ClickHouse evidence store for L5/L6 evaluation and enforcement data.
# Disabled by default. Enable with clickhouse.enabled=true.
clickhouse:
  enabled: false
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8"
  auth:
    user: default
    # For production, create a Secret externally and reference it via
    # clickhouse.auth.existingSecret. This default is for local dev only.
    password: complytime-dev
    existingSecret: ""
  storage:
    size: 2Gi
  retentionMonths: 24
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"
  mcp:
    image:
      repository: docker.io/mcp/clickhouse
      # Pin to a release tag in production to ensure reproducible deployments.
      tag: latest

# -- Built-in OCI registry (dev only). Disable for production clusters
# where an external registry (Quay, GHCR, etc.) is available.
registry:
  enabled: true
  # Pin to a release tag in production to ensure reproducible deployments.
  image: ghcr.io/project-zot/zot-linux-amd64:latest
  service:
    port: 5000
    type: NodePort
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  seed:
    enabled: true
    image: ghcr.io/oras-project/oras:v1.2.2

# -- NetworkPolicy for Helm-managed studio pods (gateway, registry, clickhouse).
# Agents and MCP servers are managed by kagent/kmcp; their network policies
# should be configured at the kagent level.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium). Kind's default
# kindnet does NOT enforce policies — deploy to a production cluster for enforcement.
networkPolicy:
  enabled: true
