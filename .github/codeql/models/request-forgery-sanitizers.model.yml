# SPDX-License-Identifier: Apache-2.0
#
# MaD barrier rows for go/request-forgery (CWE-918).
#
# Each row is a 9-tuple matching the barrierModel extensible predicate:
#   (package, type, subtypes, name, signature, ext, output, kind, provenance)
#
# BuildAllowedRegistryURL validates the host against a server-configured
# allowlist of insecure registries and constructs a safe URL via net/url.URL.
# Its ReturnValue (the URL string) is the barrier: tainted query-param data
# flows in, a sanitised URL comes out.
#
# Runtime defence layers (internal/registry/registry.go):
#   1. isValidRegistryHost — rejects path separators, userinfo, backslashes
#   2. Allowlist match — host must equal an entry in the operator-configured
#      InsecureRegistries slice (Helm values)
#   3. net/url.URL struct construction — prevents host injection
#   4. OCI regex validators (reOCIRepo, reOCITag, reOCIDigest) on path
#      segments in each handler before the URL is built

extensions:
  - addsTo:
      pack: codeql/go-all
      extensible: barrierModel
    data:
      - ["github.com/complytime/complytime-studio/internal/registry", "", false, "BuildAllowedRegistryURL", "", "", "ReturnValue", "request-forgery", "manual"]
