#
# Auto-generate secrets that do not need to be user-provided:
#   cookie-secret  — OAuth2 Proxy cookie encryption key
#   proxy-secret   — shared secret between OAuth2 Proxy and gateway for header trust
#
# Uses Helm lookup to preserve values across upgrades.
# To bring your own secret: set auth.cookieSecretName in values.yaml.
{{- if not .Values.auth.cookieSecretName }}
{{- $secretName := "studio-cookie-secret" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data "cookie-secret") }}
  cookie-secret: {{ index $existing.data "cookie-secret" }}
  {{- else }}
  cookie-secret: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existing $existing.data (index $existing.data "proxy-secret") }}
  proxy-secret: {{ index $existing.data "proxy-secret" }}
  {{- else }}
  proxy-secret: {{ randAlphaNum 48 | sha256sum | trunc 48 | b64enc }}
  {{- end }}
{{- end }}
