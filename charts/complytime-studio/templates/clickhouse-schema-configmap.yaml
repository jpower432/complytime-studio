# SPDX-License-Identifier: Apache-2.0
{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: studio-clickhouse-schema
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
data:
  users_override.xml: |
    <clickhouse>
        <users>
            <{{ .Values.clickhouse.auth.readerUser }}>
                <password>{{ .Values.clickhouse.auth.readerPassword }}</password>
                <networks>
                    <ip>::/0</ip>
                </networks>
                <profile>readonly</profile>
                <quota>default</quota>
            </{{ .Values.clickhouse.auth.readerUser }}>
        </users>
    </clickhouse>
  low_resource_config.xml: |
    <clickhouse>
        <max_thread_pool_size>1000</max_thread_pool_size>
        <background_schedule_pool_size>8</background_schedule_pool_size>
        <background_pool_size>8</background_pool_size>
        <background_merges_mutations_concurrency_ratio>1</background_merges_mutations_concurrency_ratio>
        <merge_tree>
            <number_of_free_entries_in_pool_to_execute_mutation>4</number_of_free_entries_in_pool_to_execute_mutation>
            <number_of_free_entries_in_pool_to_lower_max_size_of_merge>4</number_of_free_entries_in_pool_to_lower_max_size_of_merge>
            <number_of_free_entries_in_pool_to_execute_optimize_entire_partition>4</number_of_free_entries_in_pool_to_execute_optimize_entire_partition>
        </merge_tree>
    </clickhouse>
  init.sql: |
    -- Unified evidence table aligned to beacon.evidence OTel entity.
    -- Co-locates evaluation and remediation data in a single row.
    -- Remediation columns are nullable for evaluation-only records.
    CREATE TABLE IF NOT EXISTS evidence
    (
        -- Identity
        evidence_id           String,

        -- Target (OTel Resource: policy.target.*)
        target_id             String,
        target_name           Nullable(String),
        target_type           Nullable(String),
        target_env            Nullable(String),

        -- Policy engine (policy.engine.*, policy.rule.*)
        engine_name           Nullable(String),
        engine_version        Nullable(String),
        rule_id               String,
        rule_name             Nullable(String),
        rule_uri              Nullable(String),

        -- Evaluation result (policy.evaluation.*)
        eval_result           Enum8(
                                'Not Run' = 0,
                                'Passed' = 1,
                                'Failed' = 2,
                                'Needs Review' = 3,
                                'Not Applicable' = 4,
                                'Unknown' = 5
                              ),
        eval_message          Nullable(String),

        -- Compliance context (compliance.*)
        policy_id             String DEFAULT '',
        control_id            String DEFAULT '',
        control_catalog_id    Nullable(String),
        control_category      Nullable(String),
        control_applicability Array(String),
        requirement_id        String DEFAULT '',
        plan_id               Nullable(String),
        confidence            Nullable(Enum8(
                                'Undetermined' = 0,
                                'Low' = 1,
                                'Medium' = 2,
                                'High' = 3
                              )),
        steps_executed        Nullable(UInt16),
        compliance_status     Enum8(
                                'Compliant' = 0,
                                'Non-Compliant' = 1,
                                'Exempt' = 2,
                                'Not Applicable' = 3,
                                'Unknown' = 4
                              ),
        risk_level            Nullable(Enum8(
                                'Critical' = 0,
                                'High' = 1,
                                'Medium' = 2,
                                'Low' = 3,
                                'Informational' = 4
                              )),
        frameworks            Array(String),
        requirements          Array(String),

        -- Remediation / enforcement (nullable for eval-only records)
        remediation_action    Nullable(Enum8(
                                'Block' = 0,
                                'Allow' = 1,
                                'Remediate' = 2,
                                'Waive' = 3,
                                'Notify' = 4,
                                'Unknown' = 5
                              )),
        remediation_status    Nullable(Enum8(
                                'Success' = 0,
                                'Fail' = 1,
                                'Skipped' = 2,
                                'Unknown' = 3
                              )),
        remediation_desc      Nullable(String),
        exception_id          Nullable(String),
        exception_active      Nullable(Bool),

        -- Enrichment provenance
        enrichment_status     Enum8(
                                'Success' = 0,
                                'Unmapped' = 1,
                                'Partial' = 2,
                                'Unknown' = 3,
                                'Skipped' = 4
                              ),

        -- Attestation provenance (OCI digest of in-toto attestation bundle)
        attestation_ref       Nullable(String),
        source_registry       Nullable(String),
        blob_ref              Nullable(String),

        -- Certification status (denormalized from certifications table)
        certified             Bool DEFAULT false,

        -- Timestamps
        collected_at          DateTime64(3),
        ingested_at           DateTime64(3) DEFAULT now64(3),

        row_key               String MATERIALIZED concat(evidence_id, '/', control_id, '/', requirement_id)
    )
    ENGINE = ReplacingMergeTree(ingested_at)
    PARTITION BY toYYYYMM(collected_at)
    ORDER BY (target_id, policy_id, control_id, collected_at, row_key)
    TTL toDateTime(collected_at) + INTERVAL {{ .Values.clickhouse.retentionMonths }} MONTH;

    -- Imported policies from OCI registries.
    CREATE TABLE IF NOT EXISTS policies
    (
        policy_id             String,
        title                 String,
        version               Nullable(String),
        oci_reference         String,
        content               String,
        imported_at           DateTime64(3) DEFAULT now64(3),
        imported_by           Nullable(String)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (policy_id);

    -- Crosswalk mapping documents linking internal criteria to external frameworks.
    CREATE TABLE IF NOT EXISTS mapping_documents
    (
        mapping_id            String,
        policy_id             String,
        framework             String,
        content               String,
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (mapping_id, policy_id);

    -- Structured mapping entries parsed from mapping_documents at import time.
    -- Enables SQL joins between evidence and framework objectives.
    CREATE TABLE IF NOT EXISTS mapping_entries
    (
        mapping_id            String,
        policy_id             String,
        control_id            String,
        requirement_id        String DEFAULT '',
        framework             String,
        reference             String,
        strength              UInt8 DEFAULT 0,
        confidence            String DEFAULT '',
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (policy_id, framework, control_id, reference);

    -- Parsed L2 ControlCatalog entries.
    CREATE TABLE IF NOT EXISTS controls
    (
        catalog_id            String,
        control_id            String,
        title                 String,
        objective             String,
        group_id              String,
        state                 LowCardinality(String) DEFAULT 'Active',
        policy_id             String DEFAULT '',
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (catalog_id, control_id);

    -- Parsed L2 assessment requirements linked to controls.
    CREATE TABLE IF NOT EXISTS assessment_requirements
    (
        catalog_id            String,
        control_id            String,
        requirement_id        String,
        text                  String,
        applicability         Array(String),
        recommendation        String DEFAULT '',
        state                 LowCardinality(String) DEFAULT 'Active',
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (catalog_id, control_id, requirement_id);

    -- Junction table: controls → threats cross-references.
    CREATE TABLE IF NOT EXISTS control_threats
    (
        catalog_id            String,
        control_id            String,
        threat_reference_id   String,
        threat_entry_id       String,
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (catalog_id, control_id, threat_reference_id, threat_entry_id);

    -- Parsed L2 ThreatCatalog entries.
    CREATE TABLE IF NOT EXISTS threats
    (
        catalog_id            String,
        threat_id             String,
        title                 String,
        description           String,
        group_id              String,
        policy_id             String DEFAULT '',
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (catalog_id, threat_id);

    -- Raw catalog artifacts for backfill.
    CREATE TABLE IF NOT EXISTS catalogs
    (
        catalog_id            String,
        catalog_type          LowCardinality(String),
        title                 String,
        content               String,
        policy_id             String DEFAULT '',
        imported_at           DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(imported_at)
    ORDER BY (catalog_id);

    -- Historical AuditLog artifacts produced by the studio assistant.
    CREATE TABLE IF NOT EXISTS audit_logs
    (
        audit_id              String,
        policy_id             String,
        audit_start           DateTime64(3),
        audit_end             DateTime64(3),
        framework             Nullable(String),
        created_at            DateTime64(3) DEFAULT now64(3),
        created_by            Nullable(String),
        content               String,
        summary               String,
        model                 Nullable(String),
        prompt_version        Nullable(String)
    )
    ENGINE = ReplacingMergeTree(created_at)
    PARTITION BY toYYYYMM(audit_start)
    ORDER BY (policy_id, audit_start, audit_id)
    TTL toDateTime(audit_start) + INTERVAL {{ .Values.clickhouse.retentionMonths }} MONTH;

    -- Pre-filtered view of failing/non-compliant evidence for agent posture queries.
    CREATE MATERIALIZED VIEW IF NOT EXISTS noncompliant_evidence
    ENGINE = ReplacingMergeTree(ingested_at)
    ORDER BY (policy_id, control_id, target_id, collected_at)
    AS SELECT *
    FROM evidence
    WHERE eval_result IN ('Failed', 'Needs Review')
       OR compliance_status = 'Non-Compliant';

    -- Agent-produced evidence classifications persisted by the Gateway.
    CREATE TABLE IF NOT EXISTS evidence_assessments
    (
        evidence_id           String,
        policy_id             String,
        plan_id               String,
        classification        Enum8(
                                'Healthy' = 1,
                                'Failing' = 2,
                                'Wrong Source' = 3,
                                'Wrong Method' = 4,
                                'Unfit Evidence' = 5,
                                'Stale' = 6,
                                'Blind' = 7
                              ),
        reason                String,
        assessed_at           DateTime64(3),
        assessed_by           String
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(assessed_at)
    ORDER BY (policy_id, plan_id, evidence_id, assessed_at);

    -- Evidence certification verdicts produced by the certifier pipeline.
    CREATE TABLE IF NOT EXISTS certifications
    (
        evidence_id       String,
        certifier         LowCardinality(String),
        certifier_version LowCardinality(String),
        result            Enum8(
                            'pass' = 1,
                            'fail' = 2,
                            'skip' = 3,
                            'error' = 4
                          ),
        reason            String,
        certified_at      DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = MergeTree()
    PARTITION BY toYYYYMM(certified_at)
    ORDER BY (evidence_id, certifier, certified_at);

    -- Schema migration tracking.
    CREATE TABLE IF NOT EXISTS schema_migrations
    (
        version               UInt32,
        description           String,
        applied_at            DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(applied_at)
    ORDER BY (version);
{{- end }}
