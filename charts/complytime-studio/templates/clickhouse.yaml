# SPDX-License-Identifier: Apache-2.0
{{- if .Values.clickhouse.enabled }}
{{- $labels := include "studio.labels" . -}}
{{- $selectorLabels := include "studio.selectorLabels" (dict "component" "studio-clickhouse" "root" .) -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: studio-clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
type: Opaque
stringData:
  CLICKHOUSE_USER: {{ .Values.clickhouse.auth.user | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
    {{- $selectorLabels | nindent 4 }}
spec:
  selector:
    {{- $selectorLabels | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: studio-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $labels | nindent 4 }}
    {{- $selectorLabels | nindent 4 }}
spec:
  serviceName: studio-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- $selectorLabels | nindent 6 }}
  template:
    metadata:
      labels:
        {{- $labels | nindent 8 }}
        {{- $selectorLabels | nindent 8 }}
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: studio-clickhouse-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: studio-clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              value: default
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: config-override
              mountPath: /etc/clickhouse-server/config.d/low_resource_config.xml
              subPath: low_resource_config.xml
          resources:
            requests:
              memory: {{ .Values.clickhouse.resources.requests.memory | quote }}
              cpu: {{ .Values.clickhouse.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.clickhouse.resources.limits.memory | quote }}
              cpu: {{ .Values.clickhouse.resources.limits.cpu | quote }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: init-scripts
          configMap:
            name: studio-clickhouse-schema
            items:
              - key: init.sql
                path: init.sql
        - name: config-override
          configMap:
            name: studio-clickhouse-schema
            items:
              - key: low_resource_config.xml
                path: low_resource_config.xml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage.size | quote }}
{{- end }}
