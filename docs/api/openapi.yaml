# SPDX-License-Identifier: Apache-2.0
openapi: 3.1.0
info:
  title: ComplyTime Platform API
  version: 0.1.0
  description: >
    REST surface served by `cmd/gateway`. Many `/api/*` routes register only when PostgreSQL
    is configured; `/api/config` is always available. After Google OAuth, the encrypted
    `studio_session` cookie authenticates `/api/*` requests (unless disabled). Optional
    `Authorization: Bearer <STUDIO_API_TOKEN>` bypasses the cookie for scripting.
    Security schemes below model bearer token and OAuth; cookie sessions are established via `/auth/*`.

servers:
  - url: http://localhost:8080
    description: Local gateway default (PORT=8080)

security:
  - bearerAuth: []
  - oauth2: [openid, email, profile]

tags:
  - name: Health
  - name: Auth
  - name: Policies
  - name: Mappings
  - name: Evidence
  - name: Certifications
  - name: AuditLogs
  - name: DraftAuditLogs
  - name: Catalogs
  - name: Posture
  - name: Requirements
  - name: ThreatsRisks
  - name: Notifications
  - name: Users
  - name: Chat
  - name: Registry
  - name: Publish
  - name: Config
  - name: Agents
  - name: Gemara

paths:
  /healthz:
    get:
      tags: [Health]
      operationId: healthz
      security: []
      summary: Liveness probe
      description: Returns plain text `ok`. When PostgreSQL is configured, verifies connectivity first (503 on failure).
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok
        '503':
          description: PostgreSQL unreachable when datastore is enabled
          content:
            text/plain:
              schema:
                type: string

  # /auth/login, /auth/callback, /auth/logout are handled by OAuth2 Proxy
  # externally and are NOT registered in the gateway's Echo router.

  /auth/logged-out:
    get:
      tags: [Auth]
      operationId: authLoggedOut
      security: []
      summary: Post-logout landing page
      description: Static HTML page shown after OAuth2 Proxy clears the session cookie.
      responses:
        '200':
          description: HTML page with sign-in link
          content:
            text/html:
              schema:
                type: string

  /auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      security: []
      summary: Current session user
      description: Requires valid `studio_session` cookie (not API bearer token).
      responses:
        '200':
          description: User profile and RBAC role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # /auth/logout is handled by OAuth2 Proxy externally.

  /api/config:
    get:
      tags: [Config]
      operationId: getConfig
      summary: Public UI configuration map
      security: []
      responses:
        '200':
          description: Key-value strings (e.g. github_org, model_provider)
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /api/system-info:
    get:
      tags: [Config]
      operationId: getSystemInfo
      summary: Runtime system information
      description: Returns version, database status, auth provider, model provider, and connected agents.
      responses:
        '200':
          description: System info map
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  database:
                    type: string
                  auth_provider:
                    type: string
                  model_provider:
                    type: string
                  agents:
                    type: array
                    items:
                      type: string

  /api/agents:
    get:
      tags: [Agents]
      operationId: listAgents
      summary: Agent directory cards
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentCard'
        '405':
          description: Method not allowed

  /api/a2a/{agentName}:
    parameters:
      - $ref: '#/components/parameters/AgentName'
    get:
      tags: [Agents]
      operationId: a2aProxyGet
      summary: Forward GET to allowlisted agent A2A endpoint
      description: >
        Gateway proxies to kagent or card URL. Extra path segments after `{agentName}` are forwarded by the server;
        OpenAPI models the first segment only.
      responses:
        '200':
          description: Agent-defined response
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Unknown agent
        '502':
          description: Upstream unreachable
    post:
      tags: [Agents]
      operationId: a2aProxyPost
      summary: Forward POST to agent A2A
      responses:
        '200':
          description: Agent-defined response
        '502':
          description: Upstream unreachable
    put:
      tags: [Agents]
      operationId: a2aProxyPut
      summary: Forward PUT to agent A2A
      responses:
        '200':
          description: Agent-defined response
    patch:
      tags: [Agents]
      operationId: a2aProxyPatch
      summary: Forward PATCH to agent A2A
      responses:
        '200':
          description: Agent-defined response
    delete:
      tags: [Agents]
      operationId: a2aProxyDelete
      summary: Forward DELETE to agent A2A
      responses:
        '200':
          description: Agent-defined response

  /api/policies:
    get:
      tags: [Policies]
      operationId: listPolicies
      summary: List imported policies
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '500':
          description: Internal error

  /api/policies/{id}:
    get:
      tags: [Policies]
      operationId: getPolicy
      summary: Policy detail with mappings
      parameters:
        - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDetailResponse'
        '400':
          description: Missing id
        '404':
          description: Policy not found

  /api/policies/import:
    post:
      tags: [Policies]
      operationId: importPolicy
      summary: Import policy YAML content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyImportRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStatusResponse'
        '400':
          description: Invalid JSON or missing fields

  /api/mappings/import:
    post:
      tags: [Mappings]
      operationId: importMapping
      summary: Import mapping document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MappingImportRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                required: [status, mapping_id]
                properties:
                  status:
                    type: string
                    example: imported
                  mapping_id:
                    type: string
        '400':
          description: Validation error

  /api/evidence:
    get:
      tags: [Evidence]
      operationId: queryEvidence
      summary: Query evidence rows
      parameters:
        - name: policy_id
          in: query
          schema:
            type: string
        - name: control_id
          in: query
          schema:
            type: string
        - name: target_name
          in: query
          schema:
            type: string
        - name: target_type
          in: query
          schema:
            type: string
        - name: target_env
          in: query
          schema:
            type: string
        - name: engine_version
          in: query
          schema:
            type: string
        - name: owner
          in: query
          schema:
            type: string
        - name: start
          in: query
          description: RFC3339 or YYYY-MM-DD
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvidenceRecord'
        '500':
          description: Query failed

  /api/evidence/ingest:
    post:
      tags: [Evidence]
      operationId: ingestEvidence
      summary: Ingest evidence records (JSON or multipart)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EvidenceRecord'
          multipart/form-data:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: JSON array of EvidenceRecord
                file:
                  type: string
                  format: binary
                  description: Optional blob attachment (`file` or `attachment`)
                attachment:
                  type: string
                  format: binary
      responses:
        '201':
          description: Evidence rows inserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
        '400':
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorsListResponse'
        '502':
          description: Blob upload failed

  /api/certifications:
    get:
      tags: [Certifications]
      operationId: queryCertifications
      summary: Certification verdicts for an evidence row
      parameters:
        - name: evidence_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CertificationRow'
        '400':
          description: Missing evidence_id

  /api/audit-logs:
    get:
      tags: [AuditLogs]
      operationId: listAuditLogs
      summary: List audit logs for a policy
      parameters:
        - name: policy_id
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          description: Date YYYY-MM-DD
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '400':
          description: Missing policy_id
    post:
      tags: [AuditLogs]
      operationId: createAuditLog
      summary: Store finalized audit log YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditLogRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  audit_id:
                    type: string
        '400':
          description: Invalid YAML or JSON

  /api/audit-logs/{id}:
    get:
      tags: [AuditLogs]
      operationId: getAuditLog
      parameters:
        - $ref: '#/components/parameters/AuditId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          description: Not found

  /api/audit-logs/promote:
    post:
      tags: [DraftAuditLogs]
      operationId: promoteDraftAuditLog
      summary: Promote draft audit log to official audit_logs (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [draft_id]
              properties:
                draft_id:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  draft_id:
                    type: string
        '400':
          description: Invalid body
        '409':
          description: Already promoted
        '403':
          description: Admin required

  /api/draft-audit-logs:
    get:
      tags: [DraftAuditLogs]
      operationId: listDraftAuditLogs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DraftAuditLog'

  /api/draft-audit-logs/{id}:
    get:
      tags: [DraftAuditLogs]
      operationId: getDraftAuditLog
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftAuditLog'
        '404':
          description: Draft not found
    patch:
      tags: [DraftAuditLogs]
      operationId: patchDraftAuditLogEdits
      summary: Persist reviewer edits JSON map
      parameters:
        - $ref: '#/components/parameters/DraftId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer_edits]
              properties:
                reviewer_edits:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/DraftReviewerEditEntry'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: saved
        '404':
          description: Draft not found
        '409':
          description: Draft already promoted

  /api/catalogs/import:
    post:
      tags: [Catalogs]
      operationId: importCatalog
      summary: Import ControlCatalog, ThreatCatalog, or RiskCatalog YAML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogImportRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  catalog_id:
                    type: string
                  catalog_type:
                    type: string
        '400':
          description: Undetectable type or missing content

  /api/posture:
    get:
      tags: [Posture]
      operationId: listPosture
      parameters:
        - name: start
          in: query
          description: RFC3339 or date-only (YYYY-MM-DD)
          schema:
            type: string
        - name: end
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostureRow'
        '400':
          description: Invalid time range

  /api/requirements:
    get:
      tags: [Requirements]
      operationId: listRequirementMatrix
      parameters:
        - name: policy_id
          in: query
          required: true
          schema:
            type: string
        - name: audit_start
          in: query
          schema:
            type: string
        - name: audit_end
          in: query
          schema:
            type: string
        - name: classification
          in: query
          schema:
            type: string
        - name: control_family
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequirementRow'
        '400':
          description: Invalid parameters

  /api/requirements/{id}/evidence:
    get:
      tags: [Requirements]
      operationId: listRequirementEvidence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Requirement or control id
        - name: policy_id
          in: query
          required: true
          schema:
            type: string
        - name: audit_start
          in: query
          schema:
            type: string
        - name: audit_end
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequirementEvidenceRow'
        '404':
          description: Requirement unknown for policy

  # Export endpoints (CSV, Excel, PDF) are planned but not yet implemented.

  /api/threats:
    get:
      tags: [ThreatsRisks]
      operationId: listThreats
      parameters:
        - name: catalog_id
          in: query
          schema:
            type: string
        - name: policy_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ThreatRow'

  /api/control-threats:
    get:
      tags: [ThreatsRisks]
      operationId: listControlThreats
      parameters:
        - name: catalog_id
          in: query
          schema:
            type: string
        - name: control_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ControlThreatRow'

  /api/risks:
    get:
      tags: [ThreatsRisks]
      operationId: listRisks
      parameters:
        - name: catalog_id
          in: query
          schema:
            type: string
        - name: policy_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskRow'

  /api/risks/severity:
    get:
      tags: [ThreatsRisks]
      operationId: listRiskSeverityByPolicy
      parameters:
        - name: policy_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskSeverityRow'

  /api/risk-threats:
    get:
      tags: [ThreatsRisks]
      operationId: listRiskThreats
      parameters:
        - name: catalog_id
          in: query
          schema:
            type: string
        - name: risk_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RiskThreatRow'

  /api/notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
    post:
      tags: [Notifications]
      operationId: createNotification
      summary: Create a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Notification'
      responses:
        '201':
          description: Notification created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: created
        '400':
          description: Invalid JSON or missing required fields

  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      operationId: notificationsUnreadCount
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/notifications/{id}/read:
    patch:
      tags: [Notifications]
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: read

  /api/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users (admin)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '403':
          description: Admin required

  /api/users/{email}/role:
    patch:
      tags: [Users]
      operationId: setUserRole
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, reviewer]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  role:
                    type: string
        '403':
          description: Admin required
        '404':
          description: User not found

  /api/role-changes:
    get:
      tags: [Users]
      operationId: listRoleChanges
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleChange'

  /api/setup-status:
    get:
      tags: [Users]
      operationId: setupStatus
      security: []
      summary: Whether first-admin bootstrap is needed
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup:
                    type: boolean

  /api/bootstrap:
    post:
      tags: [Users]
      operationId: bootstrapAdmin
      summary: Promote caller to admin when no admins exist
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  role:
                    type: string
        '401':
          description: Unauthenticated
        '409':
          description: Admin already exists

  /api/chat/history:
    get:
      tags: [Chat]
      operationId: getChatHistory
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '401':
          description: Unauthenticated
    put:
      tags: [Chat]
      operationId: putChatHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatHistoryRequest'
      responses:
        '204':
          description: Saved
        '400':
          description: Invalid JSON
        '401':
          description: Unauthenticated

  /api/registry/repositories:
    get:
      tags: [Registry]
      operationId: registryListRepositories
      parameters:
        - name: registry
          in: query
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryRepositoryEntry'
        '502':
          description: Upstream or MCP error
        '503':
          description: ORAS MCP unavailable

  /api/registry/tags:
    get:
      tags: [Registry]
      operationId: registryListTags
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
            description: host/repo/name form
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryTagEntry'

  /api/registry/manifest:
    get:
      tags: [Registry]
      operationId: registryFetchManifest
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OCI manifest JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/registry/layer:
    get:
      tags: [Registry]
      operationId: registryFetchLayer
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Blob bytes (declared JSON when insecure direct mode returns structured payloads)
          content:
            application/json:
              schema:
                type: string
                format: binary

  /api/publish:
    post:
      tags: [Publish]
      operationId: publishArtifacts
      summary: Bundle YAML artifacts and push to OCI registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifacts, target]
              properties:
                artifacts:
                  type: array
                  items:
                    type: string
                  description: Raw YAML strings
                target:
                  type: string
                  description: Registry repository reference
                tag:
                  type: string
                  default: latest
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleResult'
        '400':
          description: Invalid JSON
        '500':
          description: Push or detection failure

  /api/validate:
    post:
      tags: [Gemara]
      operationId: validateGemaraArtifact
      summary: Proxy to gemara-mcp validate_gemara_artifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GemaraValidateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GemaraValidateResponse'
        '400':
          description: Missing yaml or definition
        '503':
          description: MCP unavailable

  /api/migrate:
    post:
      tags: [Gemara]
      operationId: migrateGemaraArtifact
      summary: Proxy to gemara-mcp migrate_gemara_artifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GemaraMigrateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GemaraMigrateResponse'
        '503':
          description: MCP unavailable

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Shared secret from `STUDIO_API_TOKEN`; treated as admin-capable service identity when configured.
    oauth2:
      type: oauth2
      description: >
        Google OAuth 2.0 login flow used to mint the encrypted `studio_session` cookie.
        API requests authenticate via that cookie unless `bearerAuth` matches.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID Connect
            email: Email
            profile: Profile

  parameters:
    PolicyId:
      name: id
      in: path
      required: true
      schema:
        type: string
    AuditId:
      name: id
      in: path
      required: true
      schema:
        type: string
    DraftId:
      name: id
      in: path
      required: true
      schema:
        type: string
    AgentName:
      name: agentName
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    ErrorsListResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string

    Policy:
      type: object
      properties:
        policy_id:
          type: string
        title:
          type: string
        version:
          type: string
        oci_reference:
          type: string
        content:
          type: string
        imported_at:
          type: string
          format: date-time
        imported_by:
          type: string

    PolicyDetailResponse:
      type: object
      properties:
        policy:
          $ref: '#/components/schemas/Policy'
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/MappingDocument'

    PolicyImportRequest:
      type: object
      properties:
        oci_reference:
          type: string
        content:
          type: string
        title:
          type: string
        version:
          type: string
        policy_id:
          type: string
      required: [content, title]

    MappingDocument:
      type: object
      properties:
        mapping_id:
          type: string
        policy_id:
          type: string
        framework:
          type: string
        content:
          type: string
        imported_at:
          type: string
          format: date-time

    MappingImportRequest:
      type: object
      required: [policy_id, framework, content]
      properties:
        mapping_id:
          type: string
        policy_id:
          type: string
        framework:
          type: string
        content:
          type: string

    ImportStatusResponse:
      type: object
      properties:
        status:
          type: string
          example: imported
        policy_id:
          type: string

    EvidenceRecord:
      type: object
      description: >
        Ingest requires policy_id, target_id, control_id, collected_at (RFC3339).
        Optional fields validated against PostgreSQL-backed store enums when present.
      properties:
        evidence_id:
          type: string
        policy_id:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        target_type:
          type: string
        target_env:
          type: string
        engine_name:
          type: string
        engine_version:
          type: string
        rule_id:
          type: string
        rule_name:
          type: string
        rule_uri:
          type: string
        eval_result:
          type: string
