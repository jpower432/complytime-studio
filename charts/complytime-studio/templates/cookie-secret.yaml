#
# Auto-generate a cookie signing secret when auth.cookieSecretName is empty.
# Uses Helm lookup to preserve the value across upgrades.
# To bring your own secret: set auth.cookieSecretName in values.yaml.
{{- if not .Values.auth.cookieSecretName }}
{{- $secretName := "studio-cookie-secret" }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data "cookie-secret") }}
  cookie-secret: {{ index $existing.data "cookie-secret" }}
  {{- else }}
  cookie-secret: {{ randAlphaNum 64 | b64enc }}
  {{- end }}
{{- end }}
