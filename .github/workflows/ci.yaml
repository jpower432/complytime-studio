# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version-file: studio/package.json
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - name: Vet
        run: go vet -tags dev ./...
      - name: Test
        run: go test -tags dev -v -race -cover ./...
      - name: Build studio
        run: npm ci && npm run build
        working-directory: studio
      - name: Build gateway
        run: go build -o /dev/null ./cmd/gateway/
      - name: Build studio-mcp
        run: go build -o /dev/null ./cmd/studio-mcp/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --build-tags dev

  studio:
    name: Studio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: studio/package.json
          cache: npm
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint
        run: helm lint charts/complytime/
      - name: Template (default)
        run: helm template complytime charts/complytime/
      - name: Template (ClickHouse enabled)
        run: helm template complytime charts/complytime/ --set clickhouse.enabled=true

