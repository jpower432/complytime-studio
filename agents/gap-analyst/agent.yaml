# SPDX-License-Identifier: Apache-2.0
#
# Canonical agent definition — framework-agnostic source of truth.
# Helm renders this into a kagent Declarative Agent CRD.

name: studio-gap-analyst
description: >-
  Evidence synthesis from pre-evaluated L5/L6 data, produces AuditLog artifacts

prompt: prompt.md

skills:
  - path: skills/gemara-layers
  - repo: https://github.com/gemaraproj/gemara-skills.git
    ref: main
    path: skills/audit-classification

model:
  provider: AnthropicVertexAI
  name: claude-sonnet-4-20250514

mcp:
  - server: studio-gemara-mcp
    tools:
      - validate_gemara_artifact
      - migrate_gemara_artifact
  - server: studio-github-mcp
    allowedHeaders: [Authorization]
    tools:
      - get_file_contents
      - search_code
      - search_repositories
  - server: studio-clickhouse-mcp
    tools:
      - run_select_query
      - list_databases
      - list_tables

a2a:
  skills:
    - id: gap-analysis
      name: Gap Analysis
      description: >-
        Analyze a MappingDocument to classify coverage of each target reference
        entry. Produces a Gemara AuditLog with Gap, Finding, Observation, and
        Strength results.
      tags: [gap-analysis, audit, compliance, coverage, layer-7]
