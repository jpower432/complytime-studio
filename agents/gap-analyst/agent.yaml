# SPDX-License-Identifier: Apache-2.0
#
# Canonical agent definition — framework-agnostic source of truth.
# Helm renders this into a kagent Declarative Agent CRD.

name: studio-gap-analyst
description: >-
  Combined audit preparation — multi-target evidence synthesis, cross-framework
  coverage analysis via MappingDocuments, produces AuditLog artifacts

prompt: prompt.md

skills:
  - path: skills/gemara-layers
  - path: skills/gemara-authoring
  - repo: https://github.com/gemaraproj/gemara-skills.git
    ref: main
    path: skills/audit-classification

# Default model preference. Helm values (agents.gap-analyst.model.*) take precedence.
model:
  provider: AnthropicVertexAI
  name: claude-sonnet-4

mcp:
  - server: studio-gemara-mcp
    tools:
      - validate_gemara_artifact
      - migrate_gemara_artifact
  - server: studio-github-mcp
    allowedHeaders: [Authorization]
    tools:
      - get_file_contents
      - search_code
      - search_repositories
  - server: studio-clickhouse-mcp
    tools:
      - run_select_query
      - list_databases
      - list_tables

a2a:
  skills:
    - id: gap-analysis
      name: Combined Audit Preparation
      description: >-
        Prepare for combined audits — derive target inventory from evidence,
        assess criteria coverage per target, translate coverage to external
        frameworks via MappingDocuments using strength and confidence scores.
        Produces multi-target AuditLogs with cross-framework coverage analysis.
      tags: [gap-analysis, audit, compliance, coverage, combined-audit, layer-7]
