{{- if .Values.postgres.enabled }}
# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: studio-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "postgres" "root" .) | nindent 4 }}
spec:
  serviceName: studio-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "studio.selectorLabels" (dict "component" "postgres" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "studio.labels" . | nindent 8 }}
        {{- include "studio.selectorLabels" (dict "component" "postgres" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              {{- if .Values.postgres.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecret }}
                  key: password
              {{- else }}
              value: {{ .Values.postgres.auth.password | quote }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.auth.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.auth.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
    {{- include "studio.selectorLabels" (dict "component" "postgres" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "studio.selectorLabels" (dict "component" "postgres" "root" .) | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
{{- end }}
