{{- if .Values.studio.enabled }}
# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Service
metadata:
  name: studio-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: studio-ui
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: studio-ui
{{- end }}
