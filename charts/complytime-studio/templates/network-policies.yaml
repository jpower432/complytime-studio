#
# NetworkPolicies for Helm-managed studio pods.
# Scope: gateway, registry, clickhouse (pods with part-of: complytime-studio).
# Out of scope: agents and MCP servers — managed by kagent/kmcp with their own
# label scheme (part-of: kagent / managed-by: kmcp). Configure those at the
# kagent level if needed.
#
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.).
# Kind's default kindnet does NOT enforce policies.
{{- if .Values.networkPolicy.enabled }}
---
# Default deny ingress for all Helm-managed studio pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: complytime-studio
  policyTypes:
    - Ingress

---
# Gateway public port: accept ingress from anywhere on port 8080 (user-facing).
# /internal/* paths return 404 on this port — they are served exclusively on 8081.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - ports:
        - port: 8080
          protocol: TCP

---
# Gateway internal port: accept ingress only from assistant pods on port 8081.
# Selector uses both name and component to prevent label-spoofing lateral movement.
# See docs/decisions/internal-endpoint-isolation.md.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-gateway-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: studio-assistant
              app.kubernetes.io/component: assistant
              app.kubernetes.io/part-of: complytime-studio
      ports:
        - port: 8081
          protocol: TCP

---
# Assistant: accept ingress from namespace peers (gateway A2A proxy) on port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-assistant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: assistant
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP

{{- if .Values.registry.enabled }}
---
# Registry: accept ingress from namespace peers (gateway, seed job, oras-mcp).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: studio-registry
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 5000
          protocol: TCP
{{- end }}

{{- if .Values.clickhouse.enabled }}
---
# ClickHouse: accept ingress from namespace peers (clickhouse-mcp, ingest).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: studio-clickhouse
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8123
          protocol: TCP
        - port: 9000
          protocol: TCP
{{- end }}

{{- if .Values.nats.enabled }}
---
# NATS: accept ingress from namespace peers (gateway, ingest) on port 4222.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: studio-allow-nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: studio-nats
      app.kubernetes.io/part-of: complytime-studio
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 4222
          protocol: TCP
{{- end }}
{{- end }}
