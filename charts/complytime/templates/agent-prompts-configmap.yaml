#
# Agent system prompts loaded from agents/*/prompt.md.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: studio-agent-prompts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
data:
  assistant: |
{{ .Files.Get "agents/assistant/prompt.md" | indent 4 }}
