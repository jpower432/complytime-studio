{{- if .Values.studio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: studio-ui
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: studio-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: studio-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: studio
          image: "{{ .Values.studio.image.repository }}:{{ .Values.studio.image.tag }}"
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PLATFORM_URL
              value: {{ .Values.studio.platformUrl | default (printf "http://studio-gateway.%s.svc.cluster.local:8080" .Release.Namespace) | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
{{- end }}
